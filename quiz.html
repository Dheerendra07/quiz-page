<!DOCTYPE html>
<html>
<head>
    <title>Simple Quiz</title>
    <link rel="stylesheet" href="quiz.css">
</head>
<body>

    <div class="card">

        <h1 id="title">Hello, Let's play simple quiz</h1>

        <p class="intro">Welcome to the quiz!</p>

        <p class="intro">
            You can select only one option in each question and choose carefully.
        </p>

        <div id="quizContainer"></div>

        <button id="submitBtn" onclick="_submitQuiz()">
            Submit Quiz
        </button>

        <p id="result"></p>

    </div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="quiz.js"></script>

</body>
</html>
